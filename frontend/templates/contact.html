<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <title>Aloqa | URTT</title>
    <link href="https://jsdelivr.net" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body class="bg-light">
    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-md-10">
                <div class="card border-0 shadow-lg rounded-4 overflow-hidden">
                    <div class="row g-0">
                        <div class="col-lg-5 bg-primary p-5 text-white">
                            <h2 class="fw-bold">Biz bilan bog'laning</h2>
                            <p class="opacity-75 mb-5">Savollaringiz bo'lsa bizga yozing yoki qo'ng'iroq qiling.</p>
                            <div class="mb-4"><h5>📍 Manzil:</h5><p>Urganch sh., Tinchlik ko'chasi, 6-uy</p></div>
                            <div class="mb-4"><h5>📞 Telefon:</h5><p>+998 (93) 923-01-45</p></div>
                            <div class="mb-4"><h5>📧 Email:</h5><p>info@urtt.uz</p></div>
                        </div>
                        <div class="col-lg-7 p-5 bg-white">
                            {% with m = get_flashed_messages() %}{% if m %}<div class="alert alert-success">{{m[0]}}</div>{% endif %}{% endwith %}
                            <form method="POST" id="contactForm">
                                <div class="mb-3"><label class="form-label">To'liq ismingiz</label><input type="text" name="name" class="form-control" required></div>
                                <div class="mb-3"><label class="form-label">Telefon raqamingiz</label><input type="tel" name="phone" class="form-control" required></div>
                                <div class="mb-3"><label class="form-label">Xabaringiz</label><textarea name="message" class="form-control" rows="4"></textarea></div>
                                <button type="submit" class="btn btn-primary btn-lg w-100 fw-bold">Yuborish</button>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
