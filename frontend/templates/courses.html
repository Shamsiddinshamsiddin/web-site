<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <title>Yo'nalishlar | URTT</title>
    <link href="https://jsdelivr.net" rel="stylesheet">
    <link rel="stylesheet" href="https://jsdelivr.net">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body class="bg-light">
    <nav class="navbar navbar-dark bg-dark py-3"><div class="container"><a class="navbar-brand fw-bold" href="/">URTT</a></div></nav>
    <div class="container py-5">
        <h2 class="text-center fw-bold display-5 mb-5">Bizning Yo'nalishlar</h2>
        <div class="row g-4">
            {% for c in all_courses %}
            <div class="col-md-4">
                <div class="card h-100 border-0 shadow-sm p-4 course-card">
                    <div class="fs-1 text-primary mb-3"><i class="bi bi-{{ c.icon }}"></i></div>
                    <h4 class="fw-bold">{{ c.title }}</h4>
                    <p class="text-muted">{{ c.desc }}</p>
                    <hr>
                    <div class="d-flex justify-content-between">
                        <span class="badge bg-info text-dark">2 yil</span>
                        <a href="/admission" class="text-primary fw-bold text-decoration-none">Hujjat topshirish &rarr;</a>
                    </div>
                </div>
            </div>
            {% endfor %}
        </div>
    </div>
</body>
</html>
